<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TP JavaScript</title>
    <style>
        td {
            padding: 20px;
            font-size: 20px;
            background-color: rgb(218, 218, 218);
            width: 40px;
            height: 40px;
            text-align: center;
        }
        td.nums {
            padding: 20px;
            font-size: 20px;
            background-color: rgb(244, 244, 244);
            width: 40px;
            height: 40px;
        }
        td:hover {
            cursor: pointer;
            background-color: rgb(186, 186, 186);
        }
        textarea {
            width: 100%;
            max-width: 568px;
            height: 50px;
            font-size: 20px;
        }
        
    </style>
  </head>
  <body>
    <h1>Exercice 1</h1>
    <input type="text" id="inp1" />
    <input type="text" id="inp2" />
    <button id="ex1">Permuter</button>
    <hr />
    <h1>Exercice 2</h1>
    <input type="number" id="num1" />
    <input type="number" id="num2" />
    <button id="ex2_plus">+</button>
    <button id="ex2_minus">-</button>
    <button id="ex2_div">/</button>
    <button id="ex2_multiple">*</button>
    <br />
    <br />
    <input type="number" id="ex2_result" />

    <hr />
    <h1>Exercice 3</h1>
    Poids (kg) :
    <input type="number" id="poids" />
    <br />
    <br />
    Taille (m) :
    <input type="number" id="taille" />
    <br />
    <br />
    <button id="ex3">Calculer</button>
    <p id="ex3_result"></p>
    <hr />
    <h1>Exercice 4</h1>
    <textarea id="ex4_textarea"></textarea>

    <table>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td>(</td>
            <td>)</td>
            <td>%</td>
            <td>CE</td>
        </tr>
        <tr>
            <td>Inv</td>
            <td>sin</td>
            <td>ln</td>
            <td class="nums">7</td>
            <td class="nums">8</td>
            <td class="nums">9</td>
            <td>/</td>
        </tr>
        <tr>
            <td>pi</td>
            <td>cos</td>
            <td>log</td>
            <td class="nums">4</td>
            <td class="nums">5</td>
            <td class="nums">6</td>
            <td>x</td>
        </tr>
        <tr>
            <td>e</td>
            <td>tan</td>
            <td>rac</td>
            <td class="nums">3</td>
            <td class="nums">2</td>
            <td class="nums">1</td>
            <td>-</td>
        </tr>
        <tr>
            <td>Exp</td>
            <td>x^2</td>
            <td>x^</td>
            <td>.</td>
            <td class="nums">0</td>
            <td>=</td>
            <td>+</td>
        </tr>
    </table>

    <script src="script.js"></script>
  </body>
</html>
